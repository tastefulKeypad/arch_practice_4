volumes:
  postgres_data:

services:
  db:
    build: ./mdb
    image: arch_practice_4_db_image
    container_name: arch_practice_4_db_container
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.adminCommand(\"ping\")'"]
      interval: 5s 
      timeout: 5s 
      retries: 5

  api:
    depends_on:
      db:
        condition: service_healthy
    build: ./api
    image: arch_practice_4_api_image
    container_name: arch_practice_4_api_container
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mongodb://mongo:27017/servicedb
    command: uvicorn main:app --host 0.0.0.0 --port 8000
