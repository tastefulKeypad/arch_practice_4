volumes:
  postgres_data:

services:
  db:
    build: ./psql
    image: arch_practice_3_db_image
    container_name: arch_practice_3_db_container
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d psql_db"]
      interval: 5s 
      timeout: 5s 
      retries: 5

  api:
    depends_on:
      db:
        condition: service_healthy
    build: ./api
    image: arch_practice_3_api_image
    container_name: arch_practice_3_api_container
    ports:
      - "8000:8000"
    environment:
    - DATABASE_URL=postgresql://postgres:mysecretpassword@db:5432/psql_db
    command: uvicorn main:app --host 0.0.0.0 --port 8000
